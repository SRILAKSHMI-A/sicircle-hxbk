header {
  position: fixed; top: 56px; left: 0; right: 0; height: 76px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 52px; z-index: 100;
  background: #0a1032;
  border-bottom: 1px solid rgba(91,155,213,0.15);
}

.logo {
  display: flex;
  align-items: center;
  gap: 0;
}
/* Icon only from the PNG — screen blend removes black bg, shows red+blue icon */
.logo-icon {
  height: 52px;
  /* crop to just the icon portion — image is 640x160, icon is roughly left 200px */
  width: 80px;
  object-fit: cover;
  object-position: left center;
  mix-blend-mode: screen;
}
.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
  margin-left: 4px;
}
.logo-catalyst {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 32px;
  color: white;
  letter-spacing: 0;
}
.logo-byzoho {
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  margin-top: 2px;
}

.header-right { display: flex; align-items: center; gap: 16px; }
.counter { font-family: 'Barlow Condensed'; font-size: 15px; letter-spacing: 2px; color: rgba(255,255,255,0.35); }
.counter b { color: white; }
.prog-track { width: 80px; height: 2px; background: rgba(255,255,255,0.1); }
.prog-fill  { height: 2px; background: #e63329; width: 0%; }

.stage { position: fixed; top: 132px; bottom: 56px; left: 0; right: 0; overflow: hidden; }

.act { position: absolute; inset: 0; display: flex; flex-direction: row; align-items: center; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
.act.visible { opacity: 1; pointer-events: auto; }

/* Left: content area */
.act-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 3vw 0 8vw; gap: 0; }

/* Right: company name panel — trendy stacked split-word style */
.act-hero {
  width: 35%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 0 24px 0 44px;
  border-left: 1px solid rgba(255,255,255,0.08);
  gap: 0;
  overflow: hidden;
}

/* Each word of company name on its own line, auto-sized to fit */
.company-display-name {
  font-family: 'Barlow Condensed';
  font-weight: 900;
  font-size: clamp(22px, 4.2vw, 64px);
  line-height: 0.95;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
}
.company-display-name span {
  display: block;
  white-space: nowrap;
}
.company-display-name span:nth-child(even) {
  padding-left: 10px;
  opacity: 0.7;
}

/* Colour underline bar */
.company-display-dot {
  height: 3px;
  width: 48px;
  border-radius: 2px;
  margin-bottom: 12px;
}

/* Industry tag */
.company-display-industry {
  font-family: 'Barlow Condensed';
  font-weight: 400;
  font-size: clamp(11px, 1.2vw, 16px);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
}

/* ── ACT LABEL — visible from 10 feet ── */
.act-label {
  font-family: 'Barlow Condensed';
  font-weight: 900;
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: 5px;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 14px;
}
.label-challenge { color: #e63329; }
.label-impact    { color: #5bb2e0; }
.label-words     { color: #f5c842; }

/* ── BODY TEXT — same size across all 3 acts ── */
.pain-text {
  font-family: 'Libre Baskerville';
  font-style: italic;
  font-size: clamp(20px, 2.4vw, 34px);
  line-height: 1.4;
  color: white;
}
.company-row { display: flex; align-items: center; gap: 14px; margin-top: 20px; }
.company-bar { width: 28px; height: 3px; flex-shrink: 0; }
.company-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: clamp(14px, 1.6vw, 20px); letter-spacing: 4px; text-transform: uppercase; }
.company-industry { font-family: 'Barlow Condensed'; font-size: clamp(12px, 1.2vw, 16px); letter-spacing: 3px; color: rgba(255,255,255,0.38); }

/* ── IMPACT NUMBER ── */
.hero-number {
  font-family: 'Barlow Condensed';
  font-weight: 900;
  font-size: clamp(60px, 10vw, 130px);
  line-height: 0.9;
  letter-spacing: -2px;
}
.impact-desc {
  font-family: 'Barlow';
  font-weight: 300;
  font-size: clamp(18px, 2.2vw, 30px);
  line-height: 1.4;
  color: rgba(255,255,255,0.8);
  margin-top: 16px;
  border-left: 3px solid #e63329;
  padding-left: 20px;
}

/* ── QUOTE ── */
.quote-text {
  font-family: 'Libre Baskerville';
  font-style: italic;
  font-size: clamp(18px, 2.2vw, 32px);
  line-height: 1.45;
  color: white;
}
.quote-mark { color: #e63329; font-size: 1.3em; line-height: 0; vertical-align: -0.25em; margin-right: 4px; }
.quote-person { margin-top: 18px; padding-left: 18px; border-left: 2px solid rgba(91,155,213,0.3); }
.quote-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: clamp(14px, 1.6vw, 20px); letter-spacing: 3px; text-transform: uppercase; }
.quote-role { font-family: 'Barlow'; font-weight: 300; font-size: clamp(12px, 1.2vw, 16px); color: rgba(255,255,255,0.42); margin-top: 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.chip { font-family: 'Barlow Condensed'; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border: 1px solid rgba(91,155,213,0.28); color: rgba(91,178,224,0.6); }

.footer-dots { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 300; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.18); cursor: pointer; transition: all 0.3s; }
.dot.active { background: #e63329; width: 20px; border-radius: 3px; }
</style>
</head>

    <div class="logo-text">
      <span class="logo-catalyst">Catalyst</span>
      <span class="logo-byzoho">by Zoho</span>

  <div class="header-right">
    <span class="counter"><b id="sNum">1</b> / 9</span>

  </div>
</header>

<div class="stage" id="stage"></div>
<div class="footer-dots" id="footerDots"></div>

<script>
const ACT_TIME = 5500;
const stories = [
  { company:"Swiggy", industry:"Food Tech", color:"#e63329", components:["QuickML","APIs"], pain:"Attrition was rising with no early-warning system to see it coming. MLOps made deploying sentiment models slow and painfully complex.", number:"Overnight", desc:"Swiggy built an unhappy-employee prediction model overnight with no-code ML deployment and live production data.", quote:"QuickML, with its API capabilities, helped us deploy the model overnight and use production data for interventions.", name:"Daksh Sahni", role:"People Analytics & Behavioural Sciences, Swiggy" },
  { company:"Saint-Gobain", industry:"Supply Chain", color:"#6ab0e0", components:["Serverless Functions","Event Triggers","APIs"], pain:"Siloed ERP and supply chain systems created blind spots impacting business and customer trust.", number:"1 Week → 1 Day", desc:"Saint-Gobain built serverless supply chain integration in a week and deployed automated workflows for 200+ users.", quote:"We developed the integration in a week and deployed it in a day.", name:"Amanda Tighe", role:"Project Manager, Saint-Gobain" },
  { company:"Livpure", industry:"E-Commerce", color:"#5cbf9e", components:["Serverless Functions","APIs","Data Store"], pain:"Siloed inventory, logistics, and order data meant customers had zero delivery visibility.", number:"Real-time", desc:"Livpure unified WMS and OMS to show estimated delivery dates by location, displayed in seconds.", quote:"Estimated delivery dates are displayed on the webpage within seconds.", name:"Livpure Team", role:"Livpure" },
  { company:"BuildHR", industry:"HR Technology", color:"#f5c842", components:["Serverless Functions","Data Store","Authentication"], pain:"HR needed a custom candidate evaluation portal but lacked secure infrastructure to scale.", number:"Global Scale", desc:"Catalyst enabled infrastructure that scaled securely with client growth, holistic and cost-effective.", quote:"Catalyst has been a holistic and cost-effective platform for our development.", name:"Lakshmi Narayan", role:"Executive Director, BuildHR" },
  { company:"ConstructionBOS", industry:"Construction", color:"#fb923c", components:["Serverless Functions","APIs","Microservices"], pain:"Spreadsheets and manual updates across multi-year projects left teams with stale, unreliable data.", number:"Live Data", desc:"Catalyst microservices synced CRM and third-party project data automatically, no infrastructure management needed.", quote:"Building the microservice on Catalyst was easy! We never had to deal with infrastructure management.", name:"Craig Mulcahy", role:"CEO, ConstructionBOS" },
  { company:"ProCreator", industry:"Digital Products", color:"#4ecdc4", components:["Serverless Functions","APIs","Application Services"], pain:"Back-end setup slowed website update cycles, blocking designers from shipping fast.", number:"60–70%", desc:"Catalyst powered a dynamic CMS for lightning-fast webpage deployments, slashing development time.", quote:"Development time was reduced by 60–70%, enabling faster delivery of dynamic pages.", name:"ProCreator Team", role:"ProCreator" },
  { company:"Codafish", industry:"App Development", color:"#e8b96a", components:["Serverless Functions","APIs"], pain:"ERP and CRM were siloed across 95 stores and 400,000 customers with no unified view.", number:"400K+", desc:"Catalyst unified ERP and CRM records across the entire business without worrying about servers.", quote:"Catalyst enables developers to build and scale applications without worrying about servers.", name:"Timo Müller", role:"Executive Director, Codafish" },
  { company:"Livasa Hospitals", industry:"Healthcare", color:"#f472b6", components:["Serverless Functions","APIs","Authentication"], pain:"Disconnected hospital systems made integrations slow and unstable, delaying critical care workflows.", number:"30%", desc:"Catalyst cut development time by 30% and launched the full platform in under 4 months.", quote:"Catalyst made interoperability seamless and reduced our go-to-market time.", name:"Dishant Gupta", role:"Group Head – IT, Livasa Hospitals" },
  { company:"Dotsquares", industry:"Enterprise IT", color:"#63b3ed", components:["Serverless Functions","APIs","Data Store"], pain:"Infrastructure provisioning slowed development timelines and blocked automated payment workflows.", number:"70%", desc:"Catalyst powered automated payment workflows, turning a challenge into a growth opportunity.", quote:"Catalyst's flexibility helped turn a challenge into a growth opportunity.", name:"Rahul Gupta", role:"Lead Development Strategist, Dotsquares" }
];

let si=0,ai=0,timer=null;
const stage=document.getElementById('stage'),progFill=document.getElementById('progFill'),fd=document.getElementById('footerDots');
stories.forEach((_,i)=>{ const d=document.createElement('div'); d.className='dot'+(i===0?' active':''); d.onclick=()=>{si=i;ai=0;render();}; fd.appendChild(d); });

function render(){
  const s=stories[si];
  document.getElementById('sNum').textContent=si+1;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===si));
  let html='';
  const words=s.company.split(" ").map(w=>`<span>${w}</span>`).join(""); const co=`<div class="act-hero"><div class="company-display-name" style="color:${s.color}">${words}</div><div class="company-display-dot" style="background:${s.color}"></div><div class="company-display-industry">${s.industry}</div></div>`;
  if(ai===0){
    html=`<div class="act visible"><div class="act-content"><div class="act-label label-challenge">Challenge</div><div class="pain-text">${s.pain}</div><div class="company-row"><div class="company-bar" style="background:${s.color}"></div><div class="company-name" style="color:${s.color}">${s.company}</div><div class="company-industry">${s.industry}</div></div></div>${co}</div>`;
  } else if(ai===1){
    html=`<div class="act visible"><div class="act-content"><div class="act-label label-impact">Catalyst Impact</div><div class="hero-number" style="color:${s.color}">${s.number}</div><div class="impact-desc">${s.desc}</div></div>${co}</div>`;
  } else {
    const chips=s.components.map(c=>`<div class="chip">${c}</div>`).join('');
    html=`<div class="act visible"><div class="act-content"><div class="act-label label-words">In Their Words</div><div class="quote-text"><span class="quote-mark">"</span>${s.quote}"</div><div class="quote-person"><div class="quote-name" style="color:${s.color}">${s.name}</div><div class="quote-role">${s.role}</div></div><div class="chips">${chips}</div></div>${co}</div>`;
  }
  stage.innerHTML=html;
  fitCompanyName();
  clearInterval(timer); progFill.style.width='0%';
  const start=Date.now();
  timer=setInterval(()=>{ const p=Math.min(100,(Date.now()-start)/ACT_TIME*100); progFill.style.width=p+'%'; if(p>=100){clearInterval(timer);advance();} },40);
}
function fitCompanyName(){
  const el = document.querySelector('.company-display-name');
  if(!el) return;
  el.querySelectorAll('span').forEach(span => {
    let fs = parseFloat(getComputedStyle(el).fontSize);
    span.style.fontSize = '';
    while(span.scrollWidth > el.clientWidth && fs > 14){
      fs -= 1;
      span.style.fontSize = fs + 'px';
    }
  });
}
function advance(){ if(ai<2){ai++;}else{ai=0;si=(si+1)%stories.length;} render(); }
function back(){ if(ai>0){ai--;}else{si=(si-1+stories.length)%stories.length;ai=2;} render(); }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight'||e.key===' '){clearInterval(timer);advance();} if(e.key==='ArrowLeft'){clearInterval(timer);back();} });
render();
</script>

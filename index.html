header {
  position: fixed; top: 56px; left: 0; right: 0; height: 76px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 52px; z-index: 100;
  background: #0b1638;
  border-bottom: 1px solid rgba(91,155,213,0.15);
}

.logo {
  display: flex;
  align-items: center;
  gap: 0;
}
/* Icon only from the PNG — screen blend removes black bg, shows red+blue icon */
.logo-icon {
  height: 52px;
  /* crop to just the icon portion — image is 640x160, icon is roughly left 200px */
  width: 80px;
  object-fit: cover;
  object-position: left center;
  mix-blend-mode: screen;
}
.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
  margin-left: 4px;
}
.logo-catalyst {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 32px;
  color: white;
  letter-spacing: 0;
}
.logo-byzoho {
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  margin-top: 2px;
}

.header-right { display: flex; align-items: center; gap: 16px; }
.counter { font-family: 'Barlow Condensed'; font-size: 15px; letter-spacing: 2px; color: rgba(255,255,255,0.35); }
.counter b { color: white; }
.prog-track { width: 80px; height: 2px; background: rgba(255,255,255,0.1); }
.prog-fill  { height: 2px; background: #e63329; width: 0%; }

.stage { position: fixed; top: 132px; bottom: 56px; left: 0; right: 0; overflow: hidden; }

.act { position: absolute; inset: 0; display: flex; flex-direction: row; align-items: center; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
.act.visible { opacity: 1; pointer-events: auto; }
.act-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 4vw 0 10vw; }
.act-hero { width: 36%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 16px 32px 16px 0; }
.act-hero img { width: 100%; object-fit: contain; mix-blend-mode: screen; opacity: 0.55; }

/* Label: big enough to read from 10ft but won't push content off screen */
.act-label {
  font-family: 'Barlow Condensed';
  font-weight: 900;
  font-size: clamp(32px, 4.5vw, 56px);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
  line-height: 1;
}
.label-challenge { color: #e63329; }
.label-impact    { color: #5bb2e0; }
.label-words     { color: #f5c842; }

/* Body text: consistent across all 3 acts */
.pain-text { font-family: 'Libre Baskerville'; font-style: italic; font-size: clamp(24px, 3vw, 40px); line-height: 1.35; color: white; max-width: 860px; }
.company-row { display: flex; align-items: center; gap: 16px; margin-top: 28px; }
.company-bar { width: 32px; height: 3px; flex-shrink: 0; }
.company-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: clamp(16px, 1.8vw, 22px); letter-spacing: 4px; text-transform: uppercase; }
.company-industry { font-family: 'Barlow Condensed'; font-size: clamp(13px, 1.3vw, 17px); letter-spacing: 3px; color: rgba(255,255,255,0.38); }

/* Hero number: large but capped so desc text still fits */
.hero-number { font-family: 'Barlow Condensed'; font-weight: 900; font-size: clamp(70px, 12vw, 160px); line-height: 0.9; letter-spacing: -3px; }
.impact-desc { font-family: 'Barlow'; font-weight: 300; font-size: clamp(24px, 3vw, 40px); line-height: 1.35; color: rgba(255,255,255,0.8); max-width: 700px; margin-top: 20px; border-left: 3px solid #e63329; padding-left: 24px; }

.quote-text { font-family: 'Libre Baskerville'; font-style: italic; font-size: clamp(24px, 3vw, 40px); line-height: 1.35; color: white; max-width: 900px; }
.quote-mark { color: #e63329; font-size: 1.3em; line-height: 0; vertical-align: -0.25em; margin-right: 4px; }
.quote-person { margin-top: 24px; padding-left: 20px; border-left: 2px solid rgba(91,155,213,0.3); }
.quote-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: clamp(16px, 1.8vw, 22px); letter-spacing: 3px; text-transform: uppercase; }
.quote-role { font-family: 'Barlow'; font-weight: 300; font-size: clamp(13px, 1.3vw, 17px); color: rgba(255,255,255,0.42); margin-top: 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 28px; }
.chip { font-family: 'Barlow Condensed'; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border: 1px solid rgba(91,155,213,0.28); color: rgba(91,178,224,0.6); }

.footer-dots { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 300; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.18); cursor: pointer; transition: all 0.3s; }
.dot.active { background: #e63329; width: 20px; border-radius: 3px; }
</style>
</head>

function advance(){ if(ai<2){ai++;}else{ai=0;si=(si+1)%stories.length;} render(); }

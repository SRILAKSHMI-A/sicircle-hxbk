<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalyst · Customer Stories</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@200;300;400;600;700;800;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width:100%;
height:100%;
background:#060608;
overflow:hidden;
font-family:'Barlow',sans-serif;
}

/* Cinematic bars */

.letterbox-top,.letterbox-bottom{
position:fixed;
left:0;
right:0;
background:#000;
z-index:100;
height:52px;
}

.letterbox-top{top:0}
.letterbox-bottom{bottom:0}

/* Background glow */

#lightBleed{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
transition:background 1.4s ease;
}

.grain{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
opacity:0.4;
}

/* Huge company ghost text */

#ghostName{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-family:'Barlow Condensed';
font-weight:900;
font-size:clamp(120px,20vw,300px);
letter-spacing:-6px;
opacity:.12;
z-index:2;
user-select:none;
}

/* Header */

header{
position:fixed;
top:0;
left:0;
right:0;
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 44px;
z-index:110;
}

.brand{
font-family:'Barlow Condensed';
font-size:13px;
letter-spacing:5px;
text-transform:uppercase;
color:rgba(255,255,255,.4);
}

.brand b{color:white}

.header-right{
display:flex;
gap:20px;
align-items:center;
}

.story-num{
font-family:'Barlow Condensed';
font-size:13px;
letter-spacing:3px;
color:rgba(255,255,255,.4);
}

.prog-track{
width:80px;
height:1px;
background:#333;
}

.prog-fill{
height:1px;
background:white;
width:0%;
}

/* Stage */

.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

/* Acts */

.act{
position:absolute;
inset:52px;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 10vw;
opacity:0;
transition:opacity .7s ease;
}

.act.visible{opacity:1}

/* Label */

.act-label{
font-family:'Barlow Condensed';
font-size:11px;
letter-spacing:5px;
text-transform:uppercase;
color:rgba(255,255,255,.25);
margin-bottom:30px;
}

/* Act 1 */

.pain-line{
font-family:'Libre Baskerville';
font-style:italic;
font-size:clamp(26px,4vw,54px);
line-height:1.25;
color:white;
max-width:800px;
}

.company-tag{
margin-top:40px;
display:flex;
gap:16px;
align-items:center;
}

.tag-line{
width:32px;
height:1px;
}

.tag-name{
font-family:'Barlow Condensed';
letter-spacing:4px;
text-transform:uppercase;
font-size:14px;
}

.tag-industry{
font-size:12px;
letter-spacing:3px;
color:#888;
}

/* Act 2 */

.big-number{
font-family:'Barlow Condensed';
font-weight:900;
font-size:clamp(80px,17vw,210px);
line-height:.9;
letter-spacing:-4px;
}

.number-context{
font-family:'Libre Baskerville';
font-size:22px;
margin-top:25px;
max-width:540px;
color:#ccc;
}

/* Act 3 */

.voice-quote{
font-family:'Libre Baskerville';
font-style:italic;
font-size:clamp(22px,3vw,42px);
line-height:1.35;
color:white;
max-width:900px;
}

.voice-person{
margin-top:35px;
}

.person-name{
font-family:'Barlow Condensed';
letter-spacing:3px;
text-transform:uppercase;
font-size:15px;
}

.person-role{
font-size:13px;
color:#888;
margin-top:4px;
}

.components-row{
margin-top:30px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.comp-chip{
font-family:'Barlow Condensed';
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
padding:5px 10px;
border:1px solid #444;
border-radius:2px;
color:#aaa;
}

/* Footer dots */

.footer-dots{
position:fixed;
bottom:52px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
z-index:110;
}

.f-dot{
width:4px;
height:4px;
border-radius:50%;
background:#444;
cursor:pointer;
transition:.3s;
}

.f-dot.active{
background:white;
width:20px;
border-radius:2px;
}
</style>
</head>

<body>

<div class="letterbox-top"></div>
<div class="letterbox-bottom"></div>
<div id="lightBleed"></div>
<div id="ghostName"></div>

<header>
<div class="brand"><b>Catalyst</b> · Customer Stories</div>

<div class="header-right">
<div class="story-num"><b id="sNum">1</b> / 9</div>
<div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
</div>
</header>

<div class="stage" id="stage"></div>
<div class="footer-dots" id="footerDots"></div>

<script>

const ACT_TIME=5200;

const S=[

{
company:"Swiggy",
industry:"Food Tech",
color:"#e05c5c",
components:["QuickML","APIs"],

a1:{
pain:"Attrition was rising with no early-warning system to see it coming. MLOps made deploying sentiment models slow and painfully complex.",
tag:"Swiggy · Food Tech"
},

a2:{

},

a3:{
quote:"QuickML, with its API capabilities, helped us deploy the model overnight and use production data for interventions.",
name:"Daksh Sahni",
role:"People Analytics & Behavioural Sciences, Swiggy"
}
},

{
company:"Saint-Gobain",
industry:"Supply Chain",
color:"#4a9edd",
components:["Serverless Functions","Event Triggers","APIs"],

a1:{
pain:"Siloed ERP and supply chain systems created blind spots impacting business and customer trust.",
tag:"Saint-Gobain · Supply Chain"
},

a2:{
number:"1 Week → 1 Day",
context:"Saint-Gobain built serverless supply chain integration in a week and deployed automated ERP–supply chain workflows for 200+ users."
},

a3:{
quote:"We developed the integration in a week and deployed it in a day.",
name:"Amanda Tighe",
role:"Project Manager, Saint-Gobain"
}
},

{
company:"Livpure",
industry:"E-Commerce",
color:"#5cbf9e",
components:["Serverless Functions","APIs","Data Store"],

a1:{
pain:"Siloed inventory, logistics, and order data meant customers had zero delivery visibility.",
tag:"Livpure · E-Commerce"
},

a2:{
number:"Real-time",
context:"Livpure unified WMS and OMS to show delivery dates by location."
},

a3:{
quote:"Estimated delivery dates are displayed on the webpage within seconds.",
name:"Livpure Team",
role:"Livpure"
}
},

{
company:"BuildHR",
industry:"HR Technology",
color:"#fcd34d",
components:["Serverless Functions","Data Store","Authentication"],

a1:{
pain:"HR needed a custom candidate evaluation portal but lacked secure infrastructure to scale.",
tag:"BuildHR · HR Technology"
},

a2:{
number:"Global Scale",
context:"Catalyst enabled infrastructure that scaled securely with client growth."
},

a3:{
quote:"Catalyst has been a holistic and cost-effective platform for our development.",
name:"Lakshmi Narayan",
role:"Executive Director, BuildHR"
}
},

{
company:"ConstructionBOS",
industry:"Construction",
color:"#fb923c",
components:["Serverless Functions","APIs","Microservices"],

a1:{
pain:"Spreadsheets and manual updates across multi-year projects left teams with stale data.",
tag:"ConstructionBOS · Construction"
},

a2:{
number:"Live Data",
context:"Catalyst microservices synced CRM and third-party project data automatically."
},

a3:{
quote:"Building the microservice on Catalyst was easy! We never had to deal with infrastructure management.",
name:"Craig Mulcahy",
role:"CEO"
}
},

{
company:"ProCreator",
industry:"Digital Products",
color:"#4ecdc4",
components:["Serverless Functions","APIs","Application Services"],

a1:{
pain:"Back-end setup slowed website update cycles.",
tag:"ProCreator · Digital Products"
},

a2:{
number:"60–70%",
context:"Catalyst powered a dynamic CMS for lightning-fast webpage deployments."
},

a3:{
quote:"Development time was reduced by 60–70%, enabling faster delivery of dynamic pages.",
name:"ProCreator Team",
role:"ProCreator"
}
},

{

components:["Serverless Functions","APIs"],

a1:{

tag:"Codafish · Application Development"
},

a2:{
number:"400K+",
context:"Catalyst unified ERP and CRM records across the business."
},

a3:{
quote:"Catalyst enables developers to build and scale applications without worrying about servers.",
name:"Timo Müller",
role:"Executive Director"
}
},

{

industry:"Healthcare",
color:"#f472b6",
components:["Serverless Functions","APIs","Authentication"],

a1:{
pain:"Disconnected hospital systems made integrations slow and unstable.",
tag:"Livasa Hospitals · Healthcare"
},

a2:{
number:"30%",
context:"Catalyst cut development time by 30% and launched in under 4 months."
},

a3:{
quote:"Catalyst made interoperability seamless and reduced our go-to-market time.",
name:"Dishant Gupta",
role:"Group Head – IT"
}
},

{
company:"Dotsquares",
industry:"Enterprise IT",
color:"#63b3ed",
components:["Serverless Functions","APIs","Data Store"],

a1:{
pain:"Infrastructure provisioning slowed development timelines.",
tag:"Dotsquares · Enterprise IT"
},

a2:{
number:"70%",
context:"Catalyst powered automated payment workflows reducing manual work."
},

a3:{
quote:"Catalyst’s flexibility helped turn a challenge into a growth opportunity.",
name:"Rahul Gupta",
role:"Lead Development Strategist"
}
}

];

let si=0, ai=0, timer=null;

const stage=document.getElementById("stage");
const fill=document.getElementById("progFill");

function setAtmos(){
const s=S[si];

document.getElementById("ghostName").textContent=s.company.toUpperCase();
document.getElementById("ghostName").style.color=s.color+"20";
document.getElementById("sNum").textContent=si+1;
}

function showAct(){

const s=S[si];
stage.innerHTML="";

let html="";

if(ai===0){

html=`
<div class="act visible">

<div class="act-label">Challenge</div>

<div class="pain-line">${s.a1.pain}</div>

<div class="company-tag">
<div class="tag-line" style="background:${s.color}"></div>

<div>
<div class="tag-name" style="color:${s.color}">${s.company}</div>
<div class="tag-industry">${s.industry}</div>
</div>

</div>

</div>
`;

}

else if(ai===1){

html=`
<div class="act visible">

<div class="act-label">Catalyst Impact</div>

<div class="big-number" style="color:${s.color}">
${s.a2.number}
</div>

<div class="number-context">
${s.a2.context}
</div>

</div>
`;

}

else{

const chips=s.components.map(c=>`<span class="comp-chip">${c}</span>`).join("");

html=`
<div class="act visible">

<div class="voice-quote">
"${s.a3.quote}"
</div>

<div class="voice-person">
<div class="person-name" style="color:${s.color}">
${s.a3.name}
</div>

<div class="person-role">
${s.a3.role}
</div>
</div>

<div class="components-row">${chips}</div>

</div>
`;

}

stage.innerHTML=html;

startTimer();
}

function startTimer(){

clearInterval(timer);

fill.style.width="0%";

const start=Date.now();

timer=setInterval(()=>{

const pct=Math.min(100,(Date.now()-start)/ACT_TIME*100);
fill.style.width=pct+"%";

if(pct>=100){

clearInterval(timer);

if(ai<2){
ai++;
showAct();
}
else{
ai=0;
si=(si+1)%S.length;
setAtmos();
showAct();
}

}

},40);

}

/* Footer dots */

const fd=document.getElementById("footerDots");

S.forEach((_,i)=>{

const d=document.createElement("div");
d.className="f-dot"+(i===0?" active":"");

d.onclick=()=>{
si=i;
ai=0;
setAtmos();
showAct();
};

fd.appendChild(d);

});

/* keyboard navigation */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight"){
ai=ai<2?ai+1:0;
if(ai===0)si=(si+1)%S.length;
setAtmos();
showAct();
}

});

/* start */

setAtmos();
showAct();

</script>
